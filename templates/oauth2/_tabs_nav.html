<nav id="oauth2-tabs" class="flex border-b border-border mb-5 overflow-x-auto" role="tablist"{% if oob %} hx-swap-oob="outerHTML"{% endif %}>
  {% for tab in tabs %}
  <a href="/oauth2/{{ header.name }}/{{ tab.slug }}"
     hx-get="/oauth2/{{ header.name }}/{{ tab.slug }}"
     hx-target="#tab-content"
     hx-swap="innerHTML"
     hx-push-url="true"
     class="h-10 px-4 inline-flex items-center text-sm font-medium transition-colors no-underline border-b-2 shrink-0 {% if tab.slug == active_tab %}border-primary text-primary{% else %}border-transparent text-muted-foreground hover:text-foreground{% endif %}">
    {{ tab.label }}
  </a>
  {% endfor %}
</nav>
