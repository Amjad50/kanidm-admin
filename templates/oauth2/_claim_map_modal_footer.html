<button type="button"
        class="bg-surface border border-default text-secondary h-9 px-4 rounded text-sm hover:bg-hover hover:border-strong transition-colors cursor-pointer"
        hx-get="/empty"
        hx-target="#overlay-slot"
        hx-swap="innerHTML">
  Cancel
</button>
{% if !cancel_only %}
<button type="button"
        class="bg-accent text-on-accent rounded h-9 px-4 text-sm font-medium hover:opacity-90 transition-opacity cursor-pointer"
        onclick="(document.getElementById('claim-new-form')||document.getElementById('claim-row-form')||document.getElementById('claim-join-form')).requestSubmit()">
  Save
</button>
{% endif %}
