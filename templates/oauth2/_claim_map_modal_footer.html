<button type="button"
        class="bg-card border border-border text-muted-foreground h-9 px-4 rounded text-sm hover:bg-accent hover:border-input transition-colors cursor-pointer"
        hx-get="/empty"
        hx-target="#overlay-slot"
        hx-swap="innerHTML">
  Cancel
</button>
{% if !cancel_only %}
<button type="button"
        class="bg-primary text-primary-foreground rounded h-9 px-4 text-sm font-medium hover:opacity-90 transition-opacity cursor-pointer"
        onclick="(document.getElementById('claim-new-form')||document.getElementById('claim-row-form')||document.getElementById('claim-join-form')).requestSubmit()">
  Save
</button>
{% endif %}
