{% extends "login/base.html" %}

{% block title %}Sign-in denied · Kanidm Admin{% endblock %}
{% block login_title %}Sign-in denied{% endblock %}

{% block login_body %}
  <div class="flex flex-col items-center gap-4 text-center px-2 py-2">
    <span class="w-14 h-14 rounded-pill bg-destructive-soft text-destructive border border-destructive/30 inline-flex items-center justify-center shrink-0">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>
    </span>
    <div class="text-sm text-foreground max-w-xs leading-relaxed">{{ message }}</div>
  </div>

  <a href="/admin/login" class="h-11 w-full rounded-md bg-primary text-primary-foreground font-medium text-md hover:bg-primary/90 transition-colors cursor-pointer inline-flex items-center justify-center no-underline">
    Try again
  </a>
{% endblock %}
