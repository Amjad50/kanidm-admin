<div>
  <label for="{{ id }}" class="block text-sm font-medium text-foreground mb-1.5">
    {{ label }}{% if required %} <span class="text-destructive">*</span>{% endif %}
  </label>
  {% if multiline %}
  <textarea
    id="{{ id }}"
    name="{{ name }}"
    rows="{{ rows }}"
    {% if required %}required{% endif %}
    {% if autofocus %}autofocus{% endif %}
    placeholder="{{ placeholder }}"
    class="bg-card border {% if error.is_some() %}border-destructive{% else %}border-border{% endif %} rounded px-3 py-2 w-full text-sm text-foreground font-mono placeholder:text-muted-foreground focus:outline-none focus:border-input transition-colors resize-y"
  >{{ value }}</textarea>
  {% else if let Some(sfx) = suffix %}
  <div class="flex items-stretch gap-0">
    <input
      id="{{ id }}"
      name="{{ name }}"
      type="{{ input_type }}"
      {% if required %}required{% endif %}
      {% if autofocus %}autofocus{% endif %}
      value="{{ value }}"
      placeholder="{{ placeholder }}"
      class="bg-card border {% if error.is_some() %}border-destructive{% else %}border-border{% endif %} rounded-l h-9 px-3 flex-1 text-sm text-foreground placeholder:text-muted-foreground focus:outline-none focus:border-input transition-colors"
    />
    <span class="bg-popover border border-l-0 {% if error.is_some() %}border-destructive{% else %}border-border{% endif %} rounded-r h-9 px-3 inline-flex items-center text-sm text-muted-foreground font-mono">
      {{ sfx }}
    </span>
  </div>
  {% else %}
  <input
    id="{{ id }}"
    name="{{ name }}"
    type="{{ input_type }}"
    {% if required %}required{% endif %}
    {% if autofocus %}autofocus{% endif %}
    value="{{ value }}"
    placeholder="{{ placeholder }}"
    class="bg-card border {% if error.is_some() %}border-destructive{% else %}border-border{% endif %} rounded h-9 px-3 w-full text-sm text-foreground placeholder:text-muted-foreground focus:outline-none focus:border-input transition-colors"
  />
  {% endif %}
  {% if let Some(helper) = helper %}
  <div class="text-muted-foreground text-xs mt-1">{{ helper }}</div>
  {% endif %}
  {% if let Some(err) = error %}
  <div class="text-destructive text-xs mt-1">{{ err }}</div>
  {% endif %}
</div>
