<div>
  <label for="{{ id }}" class="block text-sm font-medium text-primary mb-1.5">
    {{ label }}{% if required %} <span class="text-danger">*</span>{% endif %}
  </label>
  {% if multiline %}
  <textarea
    id="{{ id }}"
    name="{{ name }}"
    rows="{{ rows }}"
    {% if required %}required{% endif %}
    {% if autofocus %}autofocus{% endif %}
    placeholder="{{ placeholder }}"
    class="bg-surface border {% if error.is_some() %}border-danger{% else %}border-default{% endif %} rounded px-3 py-2 w-full text-sm text-primary font-mono placeholder:text-tertiary focus:outline-none focus:border-strong transition-colors resize-y"
  >{{ value }}</textarea>
  {% else if let Some(sfx) = suffix %}
  <div class="flex items-stretch gap-0">
    <input
      id="{{ id }}"
      name="{{ name }}"
      type="{{ input_type }}"
      {% if required %}required{% endif %}
      {% if autofocus %}autofocus{% endif %}
      value="{{ value }}"
      placeholder="{{ placeholder }}"
      class="bg-surface border {% if error.is_some() %}border-danger{% else %}border-default{% endif %} rounded-l h-9 px-3 flex-1 text-sm text-primary placeholder:text-tertiary focus:outline-none focus:border-strong transition-colors"
    />
    <span class="bg-elevated border border-l-0 {% if error.is_some() %}border-danger{% else %}border-default{% endif %} rounded-r h-9 px-3 inline-flex items-center text-sm text-tertiary font-mono">
      {{ sfx }}
    </span>
  </div>
  {% else %}
  <input
    id="{{ id }}"
    name="{{ name }}"
    type="{{ input_type }}"
    {% if required %}required{% endif %}
    {% if autofocus %}autofocus{% endif %}
    value="{{ value }}"
    placeholder="{{ placeholder }}"
    class="bg-surface border {% if error.is_some() %}border-danger{% else %}border-default{% endif %} rounded h-9 px-3 w-full text-sm text-primary placeholder:text-tertiary focus:outline-none focus:border-strong transition-colors"
  />
  {% endif %}
  {% if let Some(helper) = helper %}
  <div class="text-tertiary text-xs mt-1">{{ helper }}</div>
  {% endif %}
  {% if let Some(err) = error %}
  <div class="text-danger text-xs mt-1">{{ err }}</div>
  {% endif %}
</div>
