<section class="bg-surface border border-subtle rounded-md shadow-card p-6">
  <div class="text-tertiary text-xs uppercase tracking-wider font-semibold mb-4">Reset credentials</div>
  <p class="text-sm text-secondary mb-4">
    Generate a short-lived link that lets the account holder reset their own credentials without admin involvement.
  </p>
  <button type="button"
          class="inline-flex items-center gap-2 bg-accent text-on-accent rounded h-8 px-3 text-sm font-medium hover:opacity-90 transition-opacity cursor-pointer border-0"
          hx-get="/people/{{ c.person_id }}/credentials/reset"
          hx-target="#overlay-slot"
          hx-swap="innerHTML">
    <span class="w-3.5 h-3.5 inline-flex shrink-0">{{ crate::views::icons::icon("key") }}</span>
    <span>Generate reset link</span>
  </button>
</section>
