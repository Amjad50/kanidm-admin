<form id="reset-ttl-form"
      hx-post="/admin/people/{{ person_id }}/credentials/reset"
      hx-target="#overlay-slot"
      hx-swap="innerHTML">
  <p class="text-sm text-muted-foreground mb-4">How long should this link be valid?</p>
  <fieldset class="border-0 p-0 m-0 flex flex-col gap-2">
    <legend class="sr-only">Link validity duration</legend>
    <label class="flex items-center gap-3 cursor-pointer group">
      <input type="radio" name="ttl" value="1" checked
             class="w-4 h-4 accent-primary cursor-pointer">
      <span class="text-sm text-foreground group-hover:text-foreground">1 hour</span>
    </label>
    <label class="flex items-center gap-3 cursor-pointer group">
      <input type="radio" name="ttl" value="8"
             class="w-4 h-4 accent-primary cursor-pointer">
      <span class="text-sm text-foreground">8 hours</span>
    </label>
    <label class="flex items-center gap-3 cursor-pointer group">
      <input type="radio" name="ttl" value="24"
             class="w-4 h-4 accent-primary cursor-pointer">
      <span class="text-sm text-foreground">24 hours</span>
    </label>
    <label class="flex items-center gap-3 cursor-pointer group">
      <input type="radio" name="ttl" value="168"
             class="w-4 h-4 accent-primary cursor-pointer">
      <span class="text-sm text-foreground">7 days</span>
    </label>
  </fieldset>
</form>
