<form id="reset-ttl-form"
      hx-post="/people/{{ person_id }}/credentials/reset"
      hx-target="#overlay-slot"
      hx-swap="innerHTML">
  <p class="text-sm text-secondary mb-4">How long should this link be valid?</p>
  <fieldset class="border-0 p-0 m-0 flex flex-col gap-2">
    <legend class="sr-only">Link validity duration</legend>
    <label class="flex items-center gap-3 cursor-pointer group">
      <input type="radio" name="ttl" value="1" checked
             class="w-4 h-4 accent-accent cursor-pointer">
      <span class="text-sm text-primary group-hover:text-primary">1 hour</span>
    </label>
    <label class="flex items-center gap-3 cursor-pointer group">
      <input type="radio" name="ttl" value="8"
             class="w-4 h-4 accent-accent cursor-pointer">
      <span class="text-sm text-primary">8 hours</span>
    </label>
    <label class="flex items-center gap-3 cursor-pointer group">
      <input type="radio" name="ttl" value="24"
             class="w-4 h-4 accent-accent cursor-pointer">
      <span class="text-sm text-primary">24 hours</span>
    </label>
    <label class="flex items-center gap-3 cursor-pointer group">
      <input type="radio" name="ttl" value="168"
             class="w-4 h-4 accent-accent cursor-pointer">
      <span class="text-sm text-primary">7 days</span>
    </label>
  </fieldset>
</form>
