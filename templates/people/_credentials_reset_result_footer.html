<button type="button"
        class="bg-transparent border border-default text-secondary h-8 px-3 rounded text-sm hover:bg-hover hover:border-strong hover:text-primary inline-flex items-center gap-2 transition-colors cursor-pointer"
        hx-get="/people/{{ person_id }}/credentials/reset"
        hx-target="#overlay-slot"
        hx-swap="innerHTML">
  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
    <path d="M21 3v5h-5"/>
    <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
    <path d="M3 21v-5h5"/>
  </svg>
  <span>Generate again</span>
</button>
<button type="button"
        class="bg-accent text-on-accent rounded h-8 px-3 text-sm font-medium hover:opacity-90 transition-opacity cursor-pointer border-0"
        hx-get="/empty"
        hx-target="#overlay-slot"
        hx-swap="innerHTML">
  Done
</button>
