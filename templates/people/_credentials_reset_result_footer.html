<button type="button"
        class="bg-transparent border border-border text-muted-foreground h-8 px-3 rounded text-sm hover:bg-accent hover:border-input hover:text-foreground inline-flex items-center gap-2 transition-colors cursor-pointer"
        hx-get="/people/{{ person_id }}/credentials/reset"
        hx-target="#overlay-slot"
        hx-swap="innerHTML">
  <span class="w-3.5 h-3.5 inline-flex shrink-0">{{ crate::views::icons::icon("refresh-cw") }}</span>
  <span>Generate again</span>
</button>
<button type="button"
        class="bg-primary text-primary-foreground rounded h-8 px-3 text-sm font-medium hover:opacity-90 transition-opacity cursor-pointer border-0"
        hx-get="/empty"
        hx-target="#overlay-slot"
        hx-swap="innerHTML">
  Done
</button>
