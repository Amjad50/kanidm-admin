<div class="bg-canvas border border-subtle rounded-md p-4">
  <label class="block text-sm font-medium text-primary mb-2">Shared secret</label>
  <div class="flex items-center gap-2 bg-elevated border border-subtle rounded p-2.5">
    <code class="font-mono text-xs text-primary flex-1 min-w-0 truncate"
          data-secret-value="{{ secret_val }}">&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;</code>
    <button type="button"
            class="text-tertiary hover:text-primary border-0 bg-transparent cursor-pointer w-7 h-7 inline-flex items-center justify-center rounded shrink-0 transition-colors"
            onclick="(function(btn){ var code = btn.previousElementSibling; var v = code.getAttribute('data-secret-value'); var showing = code.textContent === v; code.textContent = showing ? '••••••••••••••••••••••••' : v; })(this)"
            aria-label="Reveal/hide secret">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    </button>
    <button type="button"
            class="text-tertiary hover:text-primary border-0 bg-transparent cursor-pointer w-7 h-7 inline-flex items-center justify-center rounded shrink-0 transition-colors"
            data-copy="{{ secret_val }}"
            aria-label="Copy RADIUS secret">
      {% include "icons/_copy.html" %}
    </button>
  </div>
</div>
