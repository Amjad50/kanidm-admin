{% extends "base.html" %}
{% block title %}{{ section_label }} · Kanidm Admin{% endblock %}
{% block crumb %}<span class="text-primary font-medium">{{ section_label }}</span>{% endblock %}
{% block content %}
<div class="max-w-3xl mx-auto px-8 py-16 text-center">
  <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-accent-soft text-accent mb-6">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M2 12h20"/></svg>
  </div>
  <h1 class="text-2xl font-semibold tracking-tight">{{ section_label }}</h1>
  <p class="text-secondary mt-2">{{ message }}</p>
  <p class="text-tertiary text-sm mt-4 font-mono">Coming in {{ phase_label }}</p>
</div>
{% endblock %}
