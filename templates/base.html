<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Kanidm Admin{% endblock %}</title>
  <link rel="icon" href="/static/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="/static/app.css">
  <script src="https://unpkg.com/htmx.org@2.0.9" defer></script>
  <script type="module" src="/static/app.js" defer></script>
</head>
<body class="bg-canvas text-primary min-h-screen font-sans antialiased">

  <div class="min-h-screen grid" style="grid-template-columns:240px 1fr;grid-template-rows:56px 1fr;grid-template-areas:'sidebar topbar' 'sidebar main'">

    <!-- ═══ SIDEBAR ═══ -->
    <aside class="bg-surface border-r border-subtle flex flex-col py-3.5 px-3 gap-0.5 sticky top-0 h-screen overflow-y-auto" style="grid-area:sidebar">

      <!-- Brand -->
      <div class="flex items-center gap-2.5 px-2.5 py-1.5 pb-3.5">
        <img src="/static/logo-square.svg" alt="Kanidm" width="28" height="28" class="shrink-0">
        <span class="text-lg font-bold tracking-tight">Kanidm</span>
        <span class="font-mono text-[10px] px-1.5 py-0.5 rounded-sm bg-elevated text-tertiary ml-auto">v1.6.0</span>
      </div>

      <!-- Nav items -->
      <nav class="flex flex-col gap-0.5">

        <!-- Dashboard -->
        <a href="/"
           class="flex items-center gap-3 h-10 px-3 rounded text-sm font-medium transition-colors no-underline
                  {% if base.current_section == "dashboard" %}bg-accent-soft text-accent{% else %}text-secondary hover:bg-hover hover:text-primary{% endif %}">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="shrink-0">
            <rect x="3" y="3" width="7" height="9" rx="1"/>
            <rect x="14" y="3" width="7" height="5" rx="1"/>
            <rect x="14" y="12" width="7" height="9" rx="1"/>
            <rect x="3" y="16" width="7" height="5" rx="1"/>
          </svg>
          <span>Dashboard</span>
        </a>

        <!-- People -->
        <a href="/people"
           class="flex items-center gap-3 h-10 px-3 rounded text-sm font-medium transition-colors no-underline
                  {% if base.current_section == "people" %}bg-accent-soft text-accent{% else %}text-secondary hover:bg-hover hover:text-primary{% endif %}">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="shrink-0">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          <span>People</span>
        </a>

        <!-- Groups -->
        <a href="/groups"
           class="flex items-center gap-3 h-10 px-3 rounded text-sm font-medium transition-colors no-underline
                  {% if base.current_section == "groups" %}bg-accent-soft text-accent{% else %}text-secondary hover:bg-hover hover:text-primary{% endif %}">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="shrink-0">
            <path d="M18 21a8 8 0 0 0-16 0"/>
            <circle cx="10" cy="8" r="5"/>
            <path d="M22 20c0-3.37-2-6.5-4-8a5 5 0 0 0-.45-8.3"/>
          </svg>
          <span>Groups</span>
        </a>

        <!-- OAuth2 Apps -->
        <a href="/oauth2"
           class="flex items-center gap-3 h-10 px-3 rounded text-sm font-medium transition-colors no-underline
                  {% if base.current_section == "oauth2" %}bg-accent-soft text-accent{% else %}text-secondary hover:bg-hover hover:text-primary{% endif %}">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="shrink-0">
            <path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/>
          </svg>
          <span>OAuth2 Apps</span>
        </a>

      </nav>

      <!-- Bottom block -->
      <div class="mt-auto pt-3.5 border-t border-subtle flex flex-col gap-0.5">

        <!-- Theme toggle -->
        <div class="flex items-center gap-0.5 p-1 rounded bg-canvas border border-subtle my-2.5 mb-0.5" role="tablist" aria-label="Theme">
          <button id="theme-light" type="button" title="Light"
                  class="flex-1 h-6.5 rounded-sm flex items-center justify-center gap-1.5 text-xs text-tertiary cursor-pointer border-0 bg-transparent font-sans transition-colors hover:text-primary"
                  onclick="document.documentElement.setAttribute('data-theme','light');document.getElementById('theme-light').classList.add('bg-surface','text-primary');document.getElementById('theme-dark').classList.remove('bg-surface','text-primary')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="4"/>
              <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
            </svg>
          </button>
          <button id="theme-dark" type="button" title="Dark"
                  class="flex-1 h-6.5 rounded-sm flex items-center justify-center gap-1.5 text-xs text-primary cursor-pointer border-0 bg-surface font-sans transition-colors"
                  onclick="document.documentElement.setAttribute('data-theme','dark');document.getElementById('theme-dark').classList.add('bg-surface','text-primary');document.getElementById('theme-light').classList.remove('bg-surface','text-primary')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>
        </div>

        <!-- Logout -->
        <form method="post" action="/logout">
          <button type="submit"
                  class="flex items-center gap-3 w-full h-10 px-3 rounded text-sm font-medium text-secondary hover:bg-hover hover:text-primary transition-colors cursor-pointer border-0 bg-transparent font-sans text-left">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="shrink-0">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            <span>Log out</span>
          </button>
        </form>

      </div>
    </aside>

    <!-- ═══ TOPBAR ═══ -->
    <header class="bg-canvas border-b border-subtle flex items-center gap-4 px-6 sticky top-0 z-10" style="grid-area:topbar">

      <!-- Breadcrumb (left) -->
      <nav class="flex items-center gap-1.5 text-tertiary text-sm flex-1 min-w-0" aria-label="breadcrumb">
        {% block crumb %}{% endblock %}
      </nav>

      <!-- Page-level actions (between crumb and search) -->
      <div class="flex items-center gap-2 shrink-0">
        {% block page_actions %}{% endblock %}
      </div>

      <!-- Cmd+K search hint (center-right) -->
      <button type="button"
              class="flex items-center gap-2.5 bg-surface border border-default rounded h-8 px-3 text-tertiary text-sm cursor-pointer hover:border-strong transition-colors w-90">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="shrink-0">
          <circle cx="11" cy="11" r="7"/>
          <path d="m21 21-4.35-4.35"/>
        </svg>
        <span class="flex-1 text-left">Search anything…</span>
        <kbd class="font-mono text-xs bg-elevated border border-default px-1.5 py-0.5 rounded-sm text-secondary ml-auto">⌘K</kbd>
      </button>

      <!-- User menu (right) -->
      <div class="flex items-center gap-2.5 relative">
        {% if base.privileged %}
          <span class="w-2 h-2 rounded-pill bg-success shrink-0" title="Privileged session active"></span>
        {% else %}
          <span class="w-2 h-2 rounded-pill border border-tertiary shrink-0" title="Read-only session"></span>
        {% endif %}
        <div class="flex items-center gap-2.5 py-1 px-2.5 pl-1.5 rounded hover:bg-hover transition-colors cursor-pointer">
          <span class="w-7 h-7 rounded-pill bg-accent-soft text-accent border border-accent-soft flex items-center justify-center text-[11px] font-semibold shrink-0 font-sans">{{ base.user_initials }}</span>
          <span class="text-[13px] font-medium">{{ base.user_displayname }}</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="text-tertiary">
            <path d="m6 9 6 6 6-6"/>
          </svg>
        </div>
      </div>

    </header>

    <!-- ═══ MAIN CONTENT ═══ -->
    <main class="overflow-auto" style="grid-area:main">
      {% block content %}{% endblock %}
    </main>

  </div>

  <!-- HTMX modal swap target -->
  <div id="overlay-slot"></div>

  <!-- Preact cmd+K mount -->
  <div id="cmd-palette-island"></div>

  <!-- Toast stack -->
  <div id="toast-stack" class="fixed top-4 right-4 flex flex-col gap-2 z-50 w-90"></div>

</body>
</html>
