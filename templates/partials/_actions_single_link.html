<a href="{{ href }}"
   class="w-8 h-8 rounded inline-flex items-center justify-center {{ color_classes }} border-0 bg-transparent cursor-pointer transition-colors no-underline"
   aria-label="{{ label }}"
   title="{{ label }}">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    {{ icon_paths|safe }}
  </svg>
</a>
