<button type="button"
        class="bg-transparent border-0 text-secondary hover:text-primary h-9 px-4 rounded text-sm inline-flex items-center transition-colors cursor-pointer"
        hx-get="/empty" hx-target="#overlay-slot" hx-swap="innerHTML">
  Cancel
</button>
<button id="confirm-submit-{{ input_id }}"
        type="button"
        class="bg-danger-soft text-danger border border-danger hover:bg-danger hover:text-primary disabled:opacity-50 disabled:cursor-not-allowed h-9 px-4 rounded text-sm font-medium inline-flex items-center gap-2 transition-colors cursor-pointer"
        disabled
        hx-post="{{ action_url }}"
        hx-target="#overlay-slot"
        hx-swap="innerHTML"
        {% if let Some(j) = hx_vals_json %}hx-vals='{{ j|safe }}'{% endif %}>
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 6h18"/>
    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
  </svg>
  <span>{{ confirm_label }}</span>
</button>
