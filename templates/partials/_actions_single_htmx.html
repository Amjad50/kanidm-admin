<button type="button"
        aria-label="{{ label }}"
        title="{{ label }}"
        class="w-8 h-8 rounded inline-flex items-center justify-center {{ color_classes }} border-0 bg-transparent cursor-pointer transition-colors"
        {% if let Some(v) = hx_get %}hx-get="{{ v }}"{% endif %}
        {% if let Some(v) = hx_post %}hx-post="{{ v }}"{% endif %}
        hx-target="{{ hx_target }}"
        hx-swap="{{ hx_swap }}"
        {% if let Some(c) = hx_confirm %}hx-confirm="{{ c }}"{% endif %}>
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    {{ icon_paths|safe }}
  </svg>
</button>
