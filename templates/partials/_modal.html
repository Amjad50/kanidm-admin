<div class="fixed inset-0 z-50 flex items-center justify-center bg-canvas/80"
     hx-get="/empty" hx-target="#overlay-slot" hx-swap="innerHTML" hx-trigger="click">
  <div class="bg-surface border border-default rounded-md shadow-modal {{ size_class }} w-full mx-4"
       role="dialog" aria-modal="true" aria-labelledby="modal-title"
       onclick="event.stopPropagation()">
    <div class="flex items-start justify-between gap-4 p-5 border-b border-subtle">
      <h2 id="modal-title" class="text-lg font-semibold tracking-tight flex items-center gap-2.5">
        {% if let Some(svg) = icon_svg %}
          <span class="{{ icon_color_class }} inline-flex">{{ svg|safe }}</span>
        {% endif %}
        <span>{{ title }}</span>
      </h2>
      <button type="button"
              class="text-tertiary hover:text-primary border-0 bg-transparent cursor-pointer w-6 h-6 inline-flex items-center justify-center rounded transition-colors"
              aria-label="Close"
              hx-get="/empty" hx-target="#overlay-slot" hx-swap="innerHTML">
        {% include "icons/_x.html" %}
      </button>
    </div>
    <div class="p-5 flex flex-col gap-4 max-h-[60vh] overflow-y-auto">{{ body_html|safe }}</div>
    <div class="flex items-center justify-end gap-2 p-5 border-t border-subtle">{{ footer_html|safe }}</div>
  </div>
</div>
